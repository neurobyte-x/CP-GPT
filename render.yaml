services:
  - type: web
    name: cp-gpt
    runtime: docker
    dockerfilePath: backend/Dockerfile
    plan: starter
    healthCheckPath: /health
    healthCheckTimeout: 10
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: cp-gpt-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CF_API_KEY
        sync: false
      - key: CF_API_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "http://localhost,localhost:5173,localhost:3000"

  - type: redis
    name: cp-gpt-redis
    plan: free
    ipAllowList: []
